hanoi:
  bbox:
    west: 105.25
    east: 106.10
    south: 20.55
    north: 21.40
  center:
    lat: 21.0285
    lon: 105.8542

pm25_qc:
  min_value: 0.0
  max_value: 1000.0
  min_coverage_pct: 50.0

era5:
  region:
    west: 95.0
    east: 115.0
    south: 5.0
    north: 35.0
  raw_base_path: "hdfs://namenode:9000/raw/era5"
  surface_variables:
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"
    - "boundary_layer_height"
    - "surface_pressure"
    - "2m_temperature"
    - "2m_dewpoint_temperature"
    - "total_precipitation"
    - "mean_sea_level_pressure"

sentinel5p:
  raw_base_path: "hdfs://namenode:9000/raw/sentinel5p"
  products:
    - "NO2"
    - "CO"
    - "SO2"
    - "O3"
    - "AER_AI"

maiac:
  raw_base_path: "hdfs://namenode:9000/raw/maiac"
  local_fallback_path: "crawler/maiac_data"
  scale_factor: 0.001
  bands:
    - "AOD_047"
    - "AOD_055"

gold:
  horizons_hours:
    - 6
    - 12
    - 24
  lag_hours:
    - 1
    - 3
    - 6
    - 12
    - 24
  rolling_hours:
    - 3
    - 6
    - 24

hysplit:
  backward_hours: 72
  forward_hours: 24
  backward_altitudes_m: [100, 500, 1000]
  forward_altitudes_m: [50, 200, 500]
  init_offsets_deg:
    lat: [-0.2, 0.0, 0.2]
    lon: [-0.2, 0.0, 0.2]
  run_hours_utc: [0, 6, 12, 18]
  pm25_trigger_threshold: 75

trajectory:
  anchor_hours: [0, -6, -12, -24, -36, -48, -60, -72]
  cluster_k_min: 3
  cluster_k_max: 10
  cluster_k_default: 6

sampling:
  path_window_start_h: -72
  path_window_end_h: -24
  max_distance_deg: 0.5

era5:
  pressure_level_variables:
    - u_component_of_wind
    - v_component_of_wind
    - vertical_velocity
    - geopotential
    - temperature
    - specific_humidity
  pressure_levels:
    - 1000
    - 925
    - 850
    - 700
    - 600
    - 500
    - 400
  pressure_levels_time_utc: ["00:00", "06:00", "12:00", "18:00"]
