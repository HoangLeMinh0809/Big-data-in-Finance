# =============================================================================
# Atmospheric Intelligence System (AIS)
# Luồng: Weather/OpenAQ/Sentinel-5P → Python Ingest → Kafka → Spark → Iceberg/HDFS → Cassandra
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # ZOOKEEPER — quản lý cluster metadata cho Kafka
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: -Dzookeeper.4lw.commands.whitelist=ruok
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # KAFKA — message broker, nhận events từ ingest, cung cấp cho Spark
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # internal (docker network)
      - "29092:29092"     # external (host machine)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # giữ message 7 ngày
      KAFKA_MESSAGE_MAX_BYTES: 10485760     # 10MB max message size
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # HDFS NAMENODE — quản lý metadata của hệ thống file phân tán
  # ---------------------------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"    # Web UI
      - "9000:9000"    # HDFS RPC
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=bigdata-finance
    env_file:
      - ./hadoop/hadoop.env
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # HDFS DATANODE — lưu trữ dữ liệu thực tế (block storage)
  # ---------------------------------------------------------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9864:9864"    # Web UI
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop/hadoop.env
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SPARK MASTER — điều phối Spark jobs
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"    # Spark Master Web UI
      - "7077:7077"    # Spark Master RPC
    command: /opt/spark/sbin/start-master.sh
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    user: root
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./checkpoints:/opt/checkpoints
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SPARK WORKER — thực thi tasks từ Spark Master
  # ---------------------------------------------------------------------------
  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true
    user: root
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./checkpoints:/opt/checkpoints
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # PYTHON INGEST — source adapter chạy Weather và gửi events vào Kafka
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: weather_history
      SOURCE_MODE: ${WEATHER_SOURCE_MODE:-api}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_QUERY_LIST: "${WEATHER_QUERY_LIST:-}"
      WINDOW_MODE: ${WEATHER_WINDOW_MODE:-batch}
      BATCH_LOOKBACK_DAYS: ${WEATHER_BATCH_LOOKBACK_DAYS:-7}
      REALTIME_LOOKBACK_MINUTES: ${WEATHER_REALTIME_LOOKBACK_MINUTES:-10}
      REALTIME_CONTINUOUS: ${WEATHER_REALTIME_CONTINUOUS:-false}
      REALTIME_POLL_SECONDS: ${WEATHER_REALTIME_POLL_SECONDS:-600}
      WINDOW_START_UTC: "${WEATHER_WINDOW_START_UTC:-}"
      WINDOW_END_UTC: "${WEATHER_WINDOW_END_UTC:-}"
      WINDOW_STATE_FILE: /opt/checkpoints/runtime_state/weather_window_state.json
      # Số lượng bản ghi/đối tượng nguồn cần thu thập, mặc định 50
      NUM_COMPANIES: "5"
      # Lookback: lấy dữ liệu bao nhiêu ngày về trước, mặc định 30
      LOOKBACK_DAYS: "30"
      # Delay giữa mỗi message gửi Kafka (ms)
      SEND_DELAY_MS: "10"
      # Delay giữa mỗi request tới nguồn dữ liệu (ms), tránh bị rate-limit
      API_DELAY_MS: "500"
      # Khoảng cách giữa các vòng thu thập (giây). 86400=1 ngày, 0=chạy 1 lần
      SCRAPE_INTERVAL_SECONDS: "86400"
    volumes:
      - ./checkpoints:/opt/checkpoints
    command: ["python", "-u", "ingest_weather.py"]
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # OPENAQ INGEST — source adapter OpenAQ hourly API -> Kafka
  # ---------------------------------------------------------------------------
  openaq-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: openaq-ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: openaq-hourly
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      WINDOW_MODE: ${OPENAQ_WINDOW_MODE:-batch}
      BATCH_LOOKBACK_DAYS: ${OPENAQ_BATCH_LOOKBACK_DAYS:-7}
      REALTIME_LOOKBACK_MINUTES: ${OPENAQ_REALTIME_LOOKBACK_MINUTES:-10}
      REALTIME_CONTINUOUS: ${OPENAQ_REALTIME_CONTINUOUS:-false}
      REALTIME_POLL_SECONDS: ${OPENAQ_REALTIME_POLL_SECONDS:-600}
      WINDOW_START_UTC: "${OPENAQ_WINDOW_START_UTC:-}"
      WINDOW_END_UTC: "${OPENAQ_WINDOW_END_UTC:-}"
      WINDOW_STATE_FILE: /opt/checkpoints/runtime_state/openaq_window_state.json
      MAX_LOCATIONS: "100"
      REQUEST_DELAY_SEC: "0.35"
      SEND_DELAY_MS: "0"
    volumes:
      - ./checkpoints:/opt/checkpoints
    command: ["python", "-u", "openaq_ingest.py"]
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # MAIAC INGEST — source adapter MODIS MAIAC granule metadata -> Kafka
  # ---------------------------------------------------------------------------
  maiac-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: maiac-ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: maiac-summary
      CMR_GRANULES_URL: https://cmr.earthdata.nasa.gov/search/granules.json
      MAIAC_SHORT_NAME: ${MAIAC_SHORT_NAME:-MCD19A2}
      MAIAC_VERSION: ${MAIAC_VERSION:-061}
      MAIAC_BBOX: ${MAIAC_BBOX:-102,8,110,24}
      MAIAC_PROVIDER: ${MAIAC_PROVIDER:-}
      WINDOW_MODE: ${MAIAC_WINDOW_MODE:-batch}
      BATCH_LOOKBACK_DAYS: ${MAIAC_BATCH_LOOKBACK_DAYS:-30}
      REALTIME_LOOKBACK_MINUTES: ${MAIAC_REALTIME_LOOKBACK_MINUTES:-10}
      REALTIME_CONTINUOUS: ${MAIAC_REALTIME_CONTINUOUS:-false}
      REALTIME_POLL_SECONDS: ${MAIAC_REALTIME_POLL_SECONDS:-600}
      WINDOW_START_UTC: "${MAIAC_WINDOW_START_UTC:-}"
      WINDOW_END_UTC: "${MAIAC_WINDOW_END_UTC:-}"
      WINDOW_STATE_FILE: /opt/checkpoints/runtime_state/maiac_window_state.json
      PAGE_SIZE: "500"
      MAX_PAGES: "50"
      MAX_GRANULES: "0"
      SEND_DELAY_MS: "0"
      REQUEST_DELAY_SEC: "0.2"
      REQUEST_TIMEOUT_SEC: "30"
    volumes:
      - ./checkpoints:/opt/checkpoints
    command: ["python", "-u", "maiac_ingest.py"]
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # MONITORING UI — theo dõi throughput và trạng thái lưu dữ liệu vào HDFS
  # ---------------------------------------------------------------------------
  monitoring-ui:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: monitoring-ui
    hostname: monitoring-ui
    depends_on:
      kafka:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: weather_history
      HDFS_WEBHDFS_BASE: http://namenode:9870/webhdfs/v1
      HDFS_OUTPUT_PATH: /data/weather_history
      NAMENODE_JMX_URL: http://namenode:9870/jmx?qry=Hadoop:service=NameNode,name=FSNamesystem
      METRICS_SAMPLE_SECONDS: "5"
    ports:
      - "8501:8501"
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SENTINEL-5P INGEST — source adapter CDSE và gửi summary events vào Kafka
  # ---------------------------------------------------------------------------
  sentinel5p-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: sentinel5p-ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sentinel5p-summary
      # Credentials: set in your environment or .env (do not commit)
      CDSE_USERNAME: ${CDSE_USERNAME:-}
      CDSE_PASSWORD: ${CDSE_PASSWORD:-}
      BBOX: "100,8,110,24"
      WINDOW_MODE: ${S5P_WINDOW_MODE:-batch}
      BATCH_LOOKBACK_DAYS: ${S5P_BATCH_LOOKBACK_DAYS:-7}
      REALTIME_LOOKBACK_MINUTES: ${S5P_REALTIME_LOOKBACK_MINUTES:-10}
      REALTIME_CONTINUOUS: ${S5P_REALTIME_CONTINUOUS:-false}
      REALTIME_POLL_SECONDS: ${S5P_REALTIME_POLL_SECONDS:-600}
      WINDOW_START_UTC: "${S5P_WINDOW_START_UTC:-}"
      WINDOW_END_UTC: "${S5P_WINDOW_END_UTC:-}"
      WINDOW_STATE_FILE: /opt/checkpoints/runtime_state/sentinel5p_window_state.json
      MAX_RESULTS: "1"
      PRODUCTS: "NO2,CO,O3,SO2,CH4,AER"
    volumes:
      - ./checkpoints:/opt/checkpoints
    command: ["python", "-u", "sentinel5p_ingest.py"]
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # CASSANDRA — serving layer cho truy van latency thap
  # ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ais-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # AIRFLOW METADATA DB (Postgres)
  # ---------------------------------------------------------------------------
  airflow-postgres:
    image: postgres:14
    container_name: airflow-postgres
    hostname: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # AIRFLOW INIT — migrate DB va tao admin user
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: ais-airflow:2.9.3
    container_name: airflow-init
    hostname: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    user: "50000:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: 50000
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --firstname Air
      --lastname Flow
      --role Admin
      --email admin@example.com
      --password admin"
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # AIRFLOW WEBSERVER
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: ais-airflow:2.9.3
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "50000:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: 50000
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    ports:
      - "8088:8080"
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # AIRFLOW SCHEDULER
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: ais-airflow:2.9.3
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "50000:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: 50000
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # AIRFLOW TRIGGERER
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: ais-airflow:2.9.3
    container_name: airflow-triggerer
    hostname: airflow-triggerer
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "50000:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW_UID: 50000
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: triggerer
    networks:
      - bigdata-net

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  bigdata-net:
    driver: bridge
    name: bigdata-net

# =============================================================================
# VOLUMES — persistent storage cho HDFS
# =============================================================================
volumes:
  namenode_data:
    driver: local
  datanode_data:
    driver: local
  cassandra_data:
    driver: local
  airflow_postgres_data:
    driver: local
