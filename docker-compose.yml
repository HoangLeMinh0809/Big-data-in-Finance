# =============================================================================
# Big Data Pipeline Template - Stock Data Processing
# Luồng: Raw Excel → Python Ingest → Kafka → Spark Streaming → HDFS (Parquet)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # ZOOKEEPER — quản lý cluster metadata cho Kafka
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: -Dzookeeper.4lw.commands.whitelist=ruok
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # KAFKA — message broker, nhận events từ ingest, cung cấp cho Spark
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # internal (docker network)
      - "29092:29092"     # external (host machine)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # giữ message 7 ngày
      KAFKA_MESSAGE_MAX_BYTES: 10485760     # 10MB max message size
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # HDFS NAMENODE — quản lý metadata của hệ thống file phân tán
  # ---------------------------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"    # Web UI
      - "9000:9000"    # HDFS RPC
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=bigdata-finance
    env_file:
      - ./hadoop/hadoop.env
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # HDFS DATANODE — lưu trữ dữ liệu thực tế (block storage)
  # ---------------------------------------------------------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9864:9864"    # Web UI
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop/hadoop.env
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SPARK MASTER — điều phối Spark jobs
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"    # Spark Master Web UI
      - "7077:7077"    # Spark Master RPC
    command: /opt/spark/sbin/start-master.sh
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    user: root
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./checkpoints:/opt/checkpoints
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SPARK WORKER — thực thi tasks từ Spark Master
  # ---------------------------------------------------------------------------
  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true
    user: root
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./checkpoints:/opt/checkpoints
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # PYTHON INGEST — đọc file Excel, chuẩn hóa, gửi vào Kafka
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: ingest
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./company.xls.csv:/app/company.xls.csv:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: stock-prices-daily
      # Số lượng công ty cào (từ đầu CSV), mặc định 50
      NUM_COMPANIES: "5"
      # Lookback: lấy dữ liệu bao nhiêu ngày về trước, mặc định 30
      LOOKBACK_DAYS: "30"
      # Delay giữa mỗi message gửi Kafka (ms)
      SEND_DELAY_MS: "10"
      # Delay giữa mỗi request tới CafeF (ms), tránh bị rate-limit
      API_DELAY_MS: "500"
      # Khoảng cách giữa các vòng cào (giây). 86400=1 ngày, 0=chạy 1 lần
      SCRAPE_INTERVAL_SECONDS: "86400"
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # MONITORING UI — theo dõi throughput và trạng thái lưu dữ liệu vào HDFS
  # ---------------------------------------------------------------------------
  monitoring-ui:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: monitoring-ui
    hostname: monitoring-ui
    depends_on:
      kafka:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: stock-prices-daily
      HDFS_WEBHDFS_BASE: http://namenode:9870/webhdfs/v1
      HDFS_OUTPUT_PATH: /data/stock_prices_daily
      NAMENODE_JMX_URL: http://namenode:9870/jmx?qry=Hadoop:service=NameNode,name=FSNamesystem
      METRICS_SAMPLE_SECONDS: "5"
    ports:
      - "8501:8501"
    networks:
      - bigdata-net

  # ---------------------------------------------------------------------------
  # SENTINEL-5P INGEST — cào CDSE và gửi summary events vào Kafka
  # ---------------------------------------------------------------------------
  sentinel5p-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: sentinel5p-ingest
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sentinel5p-summary
      # Credentials: set in your environment or .env (do not commit)
      CDSE_USERNAME: ${CDSE_USERNAME}
      CDSE_PASSWORD: ${CDSE_PASSWORD}
      DOWNLOAD_DIR: /data/sentinel5p_data
      BBOX: "100,8,110,24"
      DATE_START: "${S5P_DATE_START:-}"
      DATE_END: "${S5P_DATE_END:-}"
      MAX_RESULTS: "1"
      PRODUCTS: "NO2,CO,O3,SO2,CH4,AER"
    command: ["python", "-u", "sentinel5p_ingest.py"]
    networks:
      - bigdata-net

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  bigdata-net:
    driver: bridge
    name: bigdata-net

# =============================================================================
# VOLUMES — persistent storage cho HDFS
# =============================================================================
volumes:
  namenode_data:
    driver: local
  datanode_data:
    driver: local
